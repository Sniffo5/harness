name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      # - name: Lint
      #   run: pnpm run lint

      # - name: Run tests
      #   run: pnpm test

      - name: Build check
        run: pnpm exec electron-vite build && pnpm exec electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false