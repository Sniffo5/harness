name: Release

on:
  push:
    branches: [master]

jobs:
  # Step 1: Run tests one final time before releasing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      # - name: Lint
      #   run: pnpm run lint

      # - name: Run tests
      #   run: pnpm test

  # Step 2: Bump version, create tag, and generate changelog
  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for changelog generation

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # patch | minor | major
          # Reads conventional commits to auto-decide bump:
          #   fix: → patch, feat: → minor, feat!: / BREAKING CHANGE → major

  # Step 3: Build platform executables in parallel
  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code signing (optional) ──────────────────────────────
          # CSC_LINK: ${{ secrets.APPLE_CERT }}
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # ──────────────────────────────────────────────────────────────
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish never
        # --publish never here because we upload assets manually in the next job

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
          if-no-files-found: warn

  # Step 4: Create GitHub Release and attach all executables
  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.new_tag }}
          name: Release ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}